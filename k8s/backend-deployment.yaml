apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-sample-backend
  labels:
    app: aws-sample-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aws-sample-backend
  template:
    metadata:
      labels:
        app: aws-sample-backend
    spec:
      containers:
      - name: aws-sample-backend
        image: 885686551889.dkr.ecr.ap-south-2.amazonaws.com/explore/aws-sample-deployment:backend-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: aws-sample-backend
  labels:
    app: aws-sample-backend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-type: external
spec:
  type: LoadBalancer
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: aws-sample-backend
