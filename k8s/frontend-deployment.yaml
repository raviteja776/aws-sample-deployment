apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-sample-frontend
  labels:
    app: aws-sample-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aws-sample-frontend
  template:
    metadata:
      labels:
        app: aws-sample-frontend
    spec:
      containers:
      - name: aws-sample-frontend
        image: aws-sample-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: VITE_BACKEND_URL
          value: "http://aws-sample-backend:3000/"

---
apiVersion: v1
kind: Service
metadata:
  name: aws-sample-frontend
  labels:
    app: aws-sample-frontend
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: aws-sample-frontend

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aws-sample-frontend-networkpolicy
spec:
  podSelector:
    matchLabels:
      app: aws-sample-frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 80
